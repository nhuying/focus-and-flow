<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus & Flow: A Journey to Your Life's Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Pridi:wght@300;400&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f9f6;
            --text-color: #4a4a4a;
            --accent-color: #8c8c73;
            --font-heading: 'Pridi', serif;
            --font-body: 'Sarabun', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #e0e0e0;
            color: var(--text-color);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        #app-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 480px;
            height: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            background-color: var(--bg-color);
            padding: 24px;
            overflow-y: auto;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        /* --- Screen 1: Onboarding --- */
        #screen-onboarding {
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .onboarding-text {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            position: absolute;
            width: 80%;
        }
        
        .onboarding-text.show {
            opacity: 1;
        }

        .breathing-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(140, 140, 115, 0.2);
            position: absolute;
            top: 30%;
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(3); opacity: 0.1; }
        }

        .btn-start {
            margin-top: 60px;
            padding: 12px 32px;
            border: 1px solid var(--text-color);
            background: transparent;
            border-radius: 30px;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-color);
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s ease, background 0.3s;
            position: absolute;
            bottom: 20%;
        }

        /* --- Screen 2: Daily Prompt --- */
        #screen-prompt {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .top-nav {
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            padding: 8px;
        }

        .date-text {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .prompt-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 16px;
            font-weight: 400;
            line-height: 1.4;
        }

        .prompt-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 48px;
            max-width: 90%;
        }

        .btn-camera {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--text-color);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: background 0.3s;
        }

        .btn-camera:active {
            background: #e0e0e0;
        }

        /* --- Screen 3: Zen Camera --- */
        #screen-camera {
            padding: 0;
            background-color: #1a1a1a;
        }

        .camera-nav {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 20;
        }

        .camera-nav .btn-icon {
            color: #fff;
        }

        #camera-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shutter-container {
            position: absolute;
            bottom: 10vh; 
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20; 
        }

        .btn-shutter {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
        }

        .btn-shutter:active {
            background: #fff;
        }

        /* --- Screen 4: Reflection --- */
        #screen-reflection {
            justify-content: flex-start;
        }

        .reflection-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .btn-text {
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-color);
            cursor: pointer;
        }

        #captured-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .reflection-questions {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .reflection-input {
            width: 100%;
            height: 150px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
            font-family: var(--font-body);
            font-size: 1rem;
            resize: none;
            background: transparent;
            outline: none;
        }

        .reflection-input:focus {
            border-color: var(--text-color);
        }

        /* --- Screen 5: Inner Gallery --- */
        #screen-gallery {
            justify-content: flex-start;
        }

        .gallery-header {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
        }

        .gallery-header h2 {
            font-family: var(--font-heading);
            font-weight: 400;
            margin-left: 16px;
        }

        #gallery-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 40px;
        }

        .gallery-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 24px;
        }

        .gallery-item-date {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .gallery-item-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .gallery-item-content {
            display: flex;
            gap: 16px;
        }

        .gallery-item-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .gallery-item-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #555;
            white-space: pre-wrap;
        }
        
        .empty-gallery {
